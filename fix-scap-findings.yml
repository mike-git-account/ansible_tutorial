---
- name: Update all RPM packages
  hosts: all
  become: yes

  tasks:
#    - name: Update all packages to the latest version
#      ansible.builtin.dnf:
#        name: "*"
#        state: latest
#        update_cache: yes
#
#    - name: Remove unused dependency packages
#      ansible.builtin.dnf:
#        autoremove: yes
     - name: Gather the package facts
       package_facts:
         manager: auto
       tags:
       - CCE-90843-4
       - CJIS-5.10.1.3
       - DISA-STIG-RHEL-09-651010
       - NIST-800-53-CM-6(a)
       - PCI-DSS-Req-11.5
       - PCI-DSSv4-11.5.2
       - enable_strategy
       - low_complexity
       - low_disruption
       - medium_severity
       - no_reboot_needed
       - package_aide_installed

     - name: Ensure aide is installed
       ansible.builtin.package:
         name: aide
         state: present
       when: '"kernel-core" in ansible_facts.packages'
       tags:
       - CCE-90843-4
       - CJIS-5.10.1.3
       - DISA-STIG-RHEL-09-651010
       - NIST-800-53-CM-6(a)
       - PCI-DSS-Req-11.5
       - PCI-DSSv4-11.5.2
       - enable_strategy
       - low_complexity
       - low_disruption
       - medium_severity
       - no_reboot_needed
       - package_aide_installed

     - name: Gather the package facts
       package_facts:
         manager: auto
       tags:
       - CCE-83438-2
       - CJIS-5.10.1.3
       - DISA-STIG-RHEL-09-651010
       - NIST-800-53-CM-6(a)
       - PCI-DSS-Req-11.5
       - PCI-DSSv4-11.5.2
       - aide_build_database
       - low_complexity
       - low_disruption
       - medium_severity
       - no_reboot_needed
       - restrict_strategy
     
     - name: Build and Test AIDE Database - Ensure AIDE Is Installed
       ansible.builtin.package:
         name: '{{ item }}'
         state: present
       with_items:
       - aide
       when: '"kernel-core" in ansible_facts.packages'
       tags:
       - CCE-83438-2
       - CJIS-5.10.1.3
       - DISA-STIG-RHEL-09-651010
       - NIST-800-53-CM-6(a)
       - PCI-DSS-Req-11.5
       - PCI-DSSv4-11.5.2
       - aide_build_database
       - low_complexity
       - low_disruption
       - medium_severity
       - no_reboot_needed
       - restrict_strategy

     - name: Build and Test AIDE Database - Check Whether the Stock AIDE Database Exists
       ansible.builtin.stat:
         path: /var/lib/aide/aide.db.new.gz
       register: aide_database_stat
       when: '"kernel-core" in ansible_facts.packages'
       tags:
       - CCE-83438-2
       - CJIS-5.10.1.3
       - DISA-STIG-RHEL-09-651010
       - NIST-800-53-CM-6(a)
       - PCI-DSS-Req-11.5
       - PCI-DSSv4-11.5.2
       - aide_build_database
       - low_complexity
       - low_disruption
       - medium_severity
       - no_reboot_needed
       - restrict_strategy

     - name: Build and Test AIDE Database - Build and Test AIDE Database
       ansible.builtin.command: /usr/sbin/aide --init
       changed_when: true
       when:
       - '"kernel-core" in ansible_facts.packages'
       - not (aide_database_stat.stat.exists is defined and aide_database_stat.stat.exists)
       register: aide_database_init
       tags:
       - CCE-83438-2
       - CJIS-5.10.1.3
       - DISA-STIG-RHEL-09-651010
       - NIST-800-53-CM-6(a)
       - PCI-DSS-Req-11.5
       - PCI-DSSv4-11.5.2
       - aide_build_database
       - low_complexity
       - low_disruption
       - medium_severity
       - no_reboot_needed
       - restrict_strategy

     - name: Build and Test AIDE Database - Stage AIDE Database
       ansible.builtin.copy:
         src: /var/lib/aide/aide.db.new.gz
         dest: /var/lib/aide/aide.db.gz
         backup: true
         remote_src: true
       when:
       - '"kernel-core" in ansible_facts.packages'
       - aide_database_init is changed
       - not ansible_check_mode
       tags:
       - CCE-83438-2
       - CJIS-5.10.1.3
       - DISA-STIG-RHEL-09-651010
       - NIST-800-53-CM-6(a)
       - PCI-DSS-Req-11.5
       - PCI-DSSv4-11.5.2
       - aide_build_database
       - low_complexity
       - low_disruption
       - medium_severity
       - no_reboot_needed
       - restrict_strategy
